name: Apply world map update

on:
  push:
    paths:
      - .github/workflows/apply-world-map-update.yml

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Write updated world map code
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip

          payload = ""

          Path("android_src/main.py").write_bytes(
              gzip.decompress(base64.b64decode(payload))
          )
          PY

      - name: Commit update and remove one-time workflow
        shell: bash
        run: |
          rm .github/workflows/apply-world-map-update.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android_src/main.py .github/workflows/apply-world-map-update.yml
          git commit -m "Add global campaign world map"
          git push origin master
