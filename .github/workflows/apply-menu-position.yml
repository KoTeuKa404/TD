name: Apply menu position fix

on:
  push:
    paths:
      - .github/workflows/apply-menu-position.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Move settings button to bottom right
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("android_src/main.py")
          source = path.read_text(encoding="utf-8")

          old_touch = 'if point_distance((x, y), (64, 655)) <= 52:'
          new_touch = 'if point_distance((x, y), (1216, 65)) <= 52:'
          old_draw = 'self.image_asset("settings.png", 18, 608, 92, 94)'
          new_draw = 'self.image_asset("settings.png", 1170, 18, 92, 94)'

          if old_touch not in source:
              raise SystemExit("Old settings touch coordinates were not found")
          if old_draw not in source:
              raise SystemExit("Old settings draw coordinates were not found")

          source = source.replace(old_touch, new_touch, 1)
          source = source.replace(old_draw, new_draw, 1)
          path.write_text(source, encoding="utf-8")
          PY

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          rm .github/workflows/apply-menu-position.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android_src/main.py .github/workflows/apply-menu-position.yml
          git commit -m "Move settings button to bottom right"
          git push origin master
